name: Deploy to Hostinger

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
      
    - name: ⚙️ Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3' # Laravel requires PHP 8.3+
        extensions: mbstring, bcmath, ctype, fileinfo, json, openssl, pdo, tokenizer, xml
        coverage: none
        
    - name: 📦 Install Composer Dependencies
      run: composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
      
    - name: ⚙️ Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: 📦 Install NPM Dependencies and Build
      run: |
        npm install
        npm run build
        
    - name: 🧹 Clear Caches before upload
      run: |
        php artisan config:clear
        php artisan route:clear
        php artisan view:clear
        
    - name: 🚀 Sync files to Hostinger via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: ./public_html/ # ⚠️ Update this if your Hostinger path is different
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/tests/**
          .env.example
          README.md
          phpunit.xml
          .github/**
